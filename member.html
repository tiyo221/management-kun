<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>マネジメントくん（個人）</title>
<link rel="stylesheet" href="shared/design.css">
</head>
<body>

<!-- サイドバー構成（Issue #34）。狭幅（≤768px）ではドロワー化し topbar のメニューで開閉する。 -->
<div class="mk-app">
  <div class="mk-sidebar-overlay" id="mk-sidebar-overlay"></div>
  <aside class="mk-sidebar" id="mk-sidebar">
    <div class="mk-brand"><span class="mk-logo">🗂️</span>マネジメントくん</div>
    <nav class="mk-nav" id="mk-nav"></nav>
    <div class="mk-actions">
      <div class="mk-actions-data">
        <button class="btn btn-secondary" id="btn-import">取り込み</button>
        <button class="btn btn-primary" id="btn-export">バックアップ</button>
      </div>
      <!-- シェルの持ち物（テーマ切替・設定）を1行に。設定はモジュール／マスタではなく
           シェルの操作なので、ナビ末尾ではなくここに常設する（Issue #148）。 -->
      <div class="mk-actions-tools">
        <button class="btn btn-ghost" id="btn-theme" title="テーマ切替" aria-label="テーマ切替">🌙</button>
        <button class="btn btn-ghost" id="btn-settings" title="設定" aria-label="設定">⚙</button>
      </div>
    </div>
  </aside>
  <div class="mk-content">
    <header class="mk-topbar">
      <button class="mk-hamburger" id="btn-menu" aria-label="メニュー" aria-expanded="false">☰</button>
      <div class="mk-brand"><span class="mk-logo">🗂️</span>マネジメントくん</div>
      <button class="mk-topbar-search" id="btn-search" aria-label="検索（Ctrl+K）" title="検索（Ctrl+K）">🔍 <span class="mk-topbar-search-hint">Ctrl+K</span></button>
    </header>
    <main class="mk-main" id="mk-main"></main>
  </div>
</div>

<!-- 配布プロファイル（メンバー配布用・個人ツールのみ）。自分ゾーン（todo/daily/goals/questions）だけを積む。
     チーム系モジュール（skills/resource/wbs）とマスタ管理は zones に載せないためナビにも
     現れず、画面から到達できない。かつ当該 <script> も読み込まないので、コードもデータ
     （localStorage）も物理的に存在しない ＝ 見た目・実データの両面で分離される（spec §1.5）。 -->
<script>
window.MK_CONFIG = {
  profile: "member",
  zones: [
    { label: "自分", modules: ["todo", "daily", "goals", "questions"] },
  ],
  // masters を持たないためマスタグループはナビに現れず到達不能（spec §1.5 / §3.6）。
};
</script>

<!-- 構成マニフェスト（単一ソース）。共有資産（土台）は全プロファイル共通で読み込み、モジュールは
     MK_CONFIG.zones（自分ゾーンのみ）に載る分だけ logic→view を読み込む（Issue #137）。zones に無い
     チーム系モジュール（skills/resource/wbs 等）の <script> は読み込まれず、コードもデータも物理的に
     存在しない（spec §1.5）。 -->
<script src="shared/manifest.js"></script>
</body>
</html>
