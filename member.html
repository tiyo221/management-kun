<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>マネジメントくん（個人）</title>
<link rel="stylesheet" href="shared/design.css">
</head>
<body>

<!-- サイドバー構成（Issue #34）。狭幅（≤768px）ではドロワー化し topbar のメニューで開閉する。 -->
<div class="mk-app">
  <div class="mk-sidebar-overlay" id="mk-sidebar-overlay"></div>
  <aside class="mk-sidebar" id="mk-sidebar">
    <div class="mk-brand"><span class="mk-logo">🗂️</span>マネジメントくん</div>
    <nav class="mk-nav" id="mk-nav"></nav>
    <div class="mk-actions">
      <button class="btn btn-ghost" id="btn-theme" title="テーマ切替">🌙</button>
      <button class="btn btn-secondary" id="btn-import">取り込み</button>
      <button class="btn btn-primary" id="btn-export">バックアップ</button>
    </div>
  </aside>
  <div class="mk-content">
    <header class="mk-topbar">
      <button class="mk-hamburger" id="btn-menu" aria-label="メニュー" aria-expanded="false">☰</button>
      <div class="mk-brand"><span class="mk-logo">🗂️</span>マネジメントくん</div>
    </header>
    <main class="mk-main" id="mk-main"></main>
  </div>
</div>

<!-- 配布プロファイル（メンバー配布用・個人ツールのみ）。自分ゾーン（todo/goals）だけを積む。
     チーム系モジュール（skills/workload/wbs）とマスタ管理は zones に載せないためナビにも
     現れず、画面から到達できない。かつ当該 <script> も読み込まないので、コードもデータ
     （localStorage）も物理的に存在しない ＝ 見た目・実データの両面で分離される（spec §1.5）。 -->
<script>
window.MK_CONFIG = {
  profile: "member",
  zones: [
    { label: "自分", modules: ["todo", "goals"], admin: [] },
  ],
};
</script>

<!-- 共有資産（classic script・window.MK 名前空間。spec §3.3） -->
<script src="shared/core.js"></script>
<script src="shared/store.js"></script>
<script src="shared/scope.js"></script>
<script src="shared/io.js"></script>
<script src="shared/people.js"></script>
<script src="shared/projects.js"></script>
<script src="shared/ui.js"></script>
<script src="shared/sample.js"></script>
<!-- モジュール（個人ゾーンのみ。logic → view の順。CONVENTIONS §1） -->
<script src="modules/todo/logic.js"></script>
<script src="modules/todo/view.js"></script>
<script src="modules/goals/logic.js"></script>
<script src="modules/goals/view.js"></script>

<!-- シェル（ブートストラップ・ルーター。プロファイル非依存） -->
<script src="shared/shell.js"></script>
</body>
</html>
