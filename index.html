<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>マネジメントくん</title>
<link rel="stylesheet" href="shared/design.css">
</head>
<body>

<!-- サイドバー構成（Issue #34）。ゾーン見出し＋配下モジュールを縦積みし、モジュール増加に
     縦方向で耐える。狭幅（≤768px）ではサイドバーをドロワー化し、topbar のメニューで開閉する。 -->
<div class="mk-app">
  <div class="mk-sidebar-overlay" id="mk-sidebar-overlay"></div>
  <aside class="mk-sidebar" id="mk-sidebar">
    <div class="mk-brand"><span class="mk-logo">🗂️</span>マネジメントくん</div>
    <nav class="mk-nav" id="mk-nav"></nav>
    <div class="mk-actions">
      <div class="mk-actions-data">
        <button class="btn btn-secondary" id="btn-import">取り込み</button>
        <button class="btn btn-primary" id="btn-export">バックアップ</button>
      </div>
      <button class="btn btn-ghost" id="btn-theme" title="テーマ切替">🌙</button>
    </div>
  </aside>
  <div class="mk-content">
    <header class="mk-topbar">
      <button class="mk-hamburger" id="btn-menu" aria-label="メニュー" aria-expanded="false">☰</button>
      <div class="mk-brand"><span class="mk-logo">🗂️</span>マネジメントくん</div>
    </header>
    <main class="mk-main" id="mk-main"></main>
  </div>
</div>

<!-- 配布プロファイル（マネージャ用・全部入り）。どのゾーン/モジュールを積むかを宣言する。
     シェル（shared/shell.js）は window.MK_CONFIG を読んで描画するため、エントリを足しても
     シェル本体の改修は不要（spec §1.5）。 -->
<script>
window.MK_CONFIG = {
  profile: "manager",
  // スコープ次元（§3.7）: 「その中に入って作業する対象」になれるマスタを宣言的に列挙する。
  // 実装配線は現状 Project の1次元のみ。将来 Product はこの配列に1行足す＋モジュールを足す
  // だけで増える（コードは "project" を決め打ちしない。§3.7.6 / CONVENTIONS §3）。
  dimensions: [
    { dim: "project", label: "プロジェクト", master: "projects" },
    // products マスタ（📦 プロダクト）は実装済みだが、Product 次元としての配線（この配列への
    // 追加）は別 Issue に分ける（Issue #37 / spec §3.7.6）。昇格時は次の1行を有効化する:
    // { dim: "product", label: "プロダクト", master: "products" }
  ],
  zones: [
    { label: "自分", modules: ["todo", "goals", "questions"] },
    { label: "ピープル", modules: ["skills", "workload", "staffing", "oneonone"] },
    { label: "デリバリー", modules: ["wbs"] },
    { label: "テクノロジー", modules: ["techstack"] },
  ],
  // マスタ（人・プロジェクト）はゾーン配下ではなく、settings と同列の「シェルレベル管理
  // グループ」として独立させる（spec §3.6 / Issue #46）。プロジェクトは wbs だけでなく
  // workload からも参照される横断マスタ（§4.6）のため、特定ゾーンの持ち物にしない。
  masters: [
    { view: "master-people", label: "👤 人" },
    { view: "master-projects", label: "📁 プロジェクト" },
    { view: "master-products", label: "📦 プロダクト" },
  ],
};
</script>

<!-- 共有資産（classic script・window.MK 名前空間。spec §3.3） -->
<script src="shared/core.js"></script>
<script src="shared/store.js"></script>
<script src="shared/scope.js"></script>
<script src="shared/io.js"></script>
<script src="shared/people.js"></script>
<script src="shared/projects.js"></script>
<script src="shared/products.js"></script>
<script src="shared/allocations.js"></script>
<script src="shared/ui.js"></script>
<script src="shared/sample.js"></script>
<!-- モジュール（logic → view の順で読み込む。CONVENTIONS §1） -->
<script src="modules/todo/logic.js"></script>
<script src="modules/todo/view.js"></script>
<script src="modules/goals/logic.js"></script>
<script src="modules/goals/view.js"></script>
<script src="modules/questions/logic.js"></script>
<script src="modules/questions/view.js"></script>
<script src="modules/wbs/logic.js"></script>
<script src="modules/wbs/view.js"></script>
<script src="modules/skills/logic.js"></script>
<script src="modules/skills/view.js"></script>
<script src="modules/workload/logic.js"></script>
<script src="modules/workload/view.js"></script>
<script src="modules/staffing/logic.js"></script>
<script src="modules/staffing/view.js"></script>
<script src="modules/oneonone/logic.js"></script>
<script src="modules/oneonone/view.js"></script>
<script src="modules/techstack/logic.js"></script>
<script src="modules/techstack/view.js"></script>

<!-- シェル（ブートストラップ・ルーター。プロファイル非依存） -->
<script src="shared/shell.js"></script>
</body>
</html>
